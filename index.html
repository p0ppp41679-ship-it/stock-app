<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 투자 대시보드</title>
    
    <!-- PWA 매니페스트 및 테마 색상, 앱 아이콘 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2933/2933116.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased min-h-screen pb-10">
    <div class="max-w-md mx-auto bg-slate-800 min-h-screen shadow-2xl relative overflow-hidden">
        
        <!-- 헤더 영역 -->
        <header class="p-6 pb-2">
            <h1 class="text-2xl font-bold tracking-tight">내 포트폴리오</h1>
            <div class="flex items-center justify-between mt-1">
                <p class="text-slate-400 text-sm">총 자산 평가액</p>
                <!-- 실시간 환율 정보 표시 뱃지 -->
                <span id="exchangeRateBadge" class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full border border-slate-600 hidden">환율 정보 불러오는 중...</span>
            </div>
            <h2 id="totalAssetValue" class="text-3xl font-extrabold text-emerald-400 mt-1">$0.00</h2>
            <!-- 한화(원) 총 자산 표시 영역 -->
            <p id="totalAssetValueKrw" class="text-sm font-medium text-slate-300 mt-0.5">₩0</p>
        </header>

        <!-- 섹션 1: 포트폴리오 비중 (도넛 차트) -->
        <section class="p-6">
            <div class="bg-slate-700/50 rounded-2xl p-4 shadow-inner relative flex justify-center">
                <canvas id="portfolioChart" width="300" height="300"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-2">
                     <span class="text-xs text-slate-400">자산 배분</span>
                     <span id="totalWeightDisplay" class="text-xl font-bold text-slate-200">100%</span>
                </div>
            </div>
        </section>

        <!-- 섹션 1.5: 포트폴리오 직접 입력 -->
        <section class="px-6 pb-4">
            <div class="bg-slate-700/30 border border-slate-600 rounded-xl p-4">
                <h3 class="text-sm font-semibold mb-3 text-slate-200">➕ 내 포트폴리오 종목 추가</h3>
                <div class="flex gap-2 mb-3">
                    <input type="text" id="symbolInput" placeholder="종목" class="w-[22%] bg-slate-800 text-white text-xs px-2 py-2 rounded-lg border border-slate-600 focus:outline-none focus:border-emerald-500 uppercase">
                    <input type="number" id="sharesInput" placeholder="수량" class="w-[20%] bg-slate-800 text-white text-xs px-2 py-2 rounded-lg border border-slate-600 focus:outline-none focus:border-emerald-500">
                    <input type="number" id="avgPriceInput" placeholder="취득가($)" class="w-[22%] bg-slate-800 text-white text-xs px-2 py-2 rounded-lg border border-slate-600 focus:outline-none focus:border-emerald-500">
                    <input type="number" id="priceInput" placeholder="현재가($)" class="w-[22%] bg-slate-800 text-white text-xs px-2 py-2 rounded-lg border border-slate-600 focus:outline-none focus:border-emerald-500">
                    <button id="addStockBtn" class="w-[14%] bg-emerald-500/80 hover:bg-emerald-500 text-white font-bold rounded-lg transition">+</button>
                </div>
                <!-- 입력 오류 메시지 표시 영역 -->
                <p id="inputErrorMsg" class="text-xs text-red-400 hidden mb-3">종목, 수량, 취득가, 현재가를 모두 정확히 입력해주세요.</p>
                <!-- 추가된 종목 태그 목록 -->
                <div id="stockList" class="flex flex-col gap-2"></div>
            </div>
        </section>

        <!-- 섹션 2: 리밸런싱 알림 -->
        <section class="px-6 py-2">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-lg font-semibold text-slate-200">리밸런싱 알림</h3>
                <span class="text-[10px] text-slate-400 border border-slate-600 bg-slate-700/50 px-2 py-0.5 rounded-full">균등 배분(N분의 1) 기준</span>
            </div>
            <!-- 리밸런싱 알림 내용이 자바스크립트에 의해 실시간으로 들어갈 영역 -->
            <div id="rebalanceContainer" class="space-y-3">
            </div>
        </section>

        <!-- 섹션 2.5: AI 포트폴리오 진단 -->
        <section class="mt-4 px-6">
            <div class="bg-gradient-to-r from-indigo-500/10 to-purple-500/10 border border-indigo-500/30 rounded-xl p-5 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-500/20 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="flex items-center justify-between mb-2 relative z-10">
                    <h3 class="text-lg font-semibold text-indigo-300 flex items-center gap-2">
                        ✨ AI 포트폴리오 진단
                    </h3>
                </div>
                <p class="text-xs text-slate-300 mb-4 relative z-10">Gemini AI가 현재 자산 배분과 리밸런싱 상태를 종합 분석하여 맞춤형 인사이트를 제공합니다.</p>
                
                <button id="aiAnalyzeBtn" class="w-full bg-indigo-500/80 hover:bg-indigo-500 text-white text-sm font-semibold py-3 rounded-lg transition shadow-[0_0_15px_rgba(99,102,241,0.3)] flex justify-center items-center gap-2 relative z-10">
                    <span>✨ 내 포트폴리오 분석하기</span>
                </button>
                
                <div id="aiResultArea" class="hidden mt-4 pt-4 border-t border-indigo-500/30 relative z-10">
                    <div id="aiLoading" class="hidden flex items-center justify-center space-x-3 py-3">
                        <div class="w-4 h-4 rounded-full border-2 border-indigo-400 border-t-transparent animate-spin"></div>
                        <span class="text-sm text-indigo-300 animate-pulse">Gemini가 데이터를 분석하고 있습니다...</span>
                    </div>
                    <div id="aiTextResponse" class="text-sm text-slate-200 leading-relaxed whitespace-pre-wrap"></div>
                </div>
            </div>
        </section>

        <!-- 섹션 3: 시장 요약 (AI 실시간 데이터 연동) -->
        <section class="mt-6 px-6 mb-6">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-lg font-semibold text-slate-200">실시간 시장 요약</h3>
                <span class="text-[10px] text-indigo-300 border border-indigo-500/30 bg-indigo-500/10 px-2 py-0.5 rounded-full">AI 검색 연동</span>
            </div>
            <div class="flex overflow-x-auto space-x-3 pb-2 scrollbar-hide" id="marketSummaryContainer">
                <div class="flex-shrink-0 bg-slate-700/50 rounded-xl p-3 w-full text-center border border-slate-600 flex items-center justify-center">
                    <div class="w-3 h-3 rounded-full border-2 border-slate-400 border-t-transparent animate-spin mr-2"></div>
                    <span class="text-xs text-slate-400">Gemini가 최신 지수를 검색 중입니다...</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            
            // 전역 API 키 설정: 외부(개인 PC, 모바일)에서 실시간 기능을 정상 사용하려면 여기에 반드시 본인의 API 키를 넣어야 합니다.
            const apiKey = ""; 

            // 전역 변수: 실시간 원/달러 환율 (초기값을 0으로 설정하여 통신 성공 여부를 명확히 구분)
            let currentExchangeRateKRW = 0;

            // 실시간 원/달러 환율 가져오기 (무료 Open API 활용)
            async function fetchRealTimeExchangeRate() {
                const badge = document.getElementById('exchangeRateBadge');
                badge.classList.remove('hidden');
                badge.textContent = '환율 정보 불러오는 중...';
                
                try {
                    // API 통신 시도 (실시간 데이터 연동)
                    const response = await fetch('https://open.er-api.com/v6/latest/USD');
                    if (response.ok) {
                        const data = await response.json();
                        currentExchangeRateKRW = data.rates.KRW; // 진짜 실시간 환율 적용
                        badge.textContent = `환율 1$ = ${Math.round(currentExchangeRateKRW)}원 (실시간 연동됨)`;
                        badge.classList.add('text-emerald-300');
                        badge.classList.remove('text-slate-300');
                    } else {
                        throw new Error("API 응답 오류");
                    }
                } catch (error) {
                    // 비행기 모드이거나 인터넷이 끊겼을 때 앱이 다운되는 것을 막기 위한 비상용 고정 환율(Fallback)
                    console.warn("환율 API 통신 실패, 비상용 고정 환율(1350원)을 적용합니다.", error);
                    currentExchangeRateKRW = 1350; 
                    badge.textContent = `환율 1$ = 약 1,350원 (오프라인 고정값)`;
                    badge.classList.add('text-red-300');
                    badge.classList.remove('text-slate-300');
                }
            }

            // 시장 지수 함수 (수정: 개인 키 입력 시 구글 공개 모델로 자동 전환)
            async function fetchRealMarketSummary() {
                const container = document.getElementById('marketSummaryContainer');
                
                // apiKey가 입력되어 있으면 일반 모델(gemini-2.5-flash)을, 비어있으면 캔버스 내부 모델을 사용
                const modelName = apiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: "오늘 또는 가장 최근 거래일의 S&P 500 지수와 NASDAQ 지수의 전일 대비 등락률(%)과 상태(상승/하락)를 구글 검색을 통해 알아내어 반드시 아래와 같은 정확한 JSON 형식으로만 응답해줘. 다른 텍스트는 절대 쓰지 마. \n\n{\"SP500\": {\"status\": \"상승 또는 하락\", \"change\": \"+1.2% 등\"}, \"NASDAQ\": {\"status\": \"상승 또는 하락\", \"change\": \"-0.5% 등\"}}" }] }],
                    tools: [{ "google_search": {} }] 
                };

                const delays = [1000, 2000]; 

                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        let responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                        
                        responseText = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
                        const marketData = JSON.parse(responseText);

                        container.innerHTML = ''; 
                        
                        const indices = [
                            { name: 'S&P 500', key: 'SP500' },
                            { name: 'NASDAQ', key: 'NASDAQ' }
                        ];

                        indices.forEach(idx => {
                            const info = marketData[idx.key] || { status: '조회 실패', change: '0.0%' };
                            const isUp = info.status.includes('상승') || info.change.includes('+');
                            const colorClass = isUp ? 'text-emerald-400' : 'text-red-400';
                            const sign = isUp && !info.change.includes('+') ? '+' : '';

                            const card = document.createElement('div');
                            card.className = 'flex-shrink-0 bg-slate-700/50 rounded-xl p-3 w-28 text-center border border-slate-600 shadow-sm';
                            card.innerHTML = `
                                <p class="text-sm font-bold text-slate-300">${idx.name}</p>
                                <p class="text-xs ${colorClass} mt-1 font-bold">${info.status}</p>
                                <p class="text-xs ${colorClass} mt-0.5">${sign}${info.change}</p>
                            `;
                            container.appendChild(card);
                        });
                        
                        return; // 성공 시 함수 완전 종료
                        
                    } catch (error) {
                        if (i === 2) {
                            console.warn("시장 지수 API 연결 불가. 오프라인 가상 데이터로 화면을 대체합니다.");
                            container.innerHTML = '';
                            
                            const mockData = {
                                "SP500": { "status": "상승", "change": "+0.85%" },
                                "NASDAQ": { "status": "상승", "change": "+1.12%" }
                            };
                            
                            const indices = [
                                { name: 'S&P 500', key: 'SP500' },
                                { name: 'NASDAQ', key: 'NASDAQ' }
                            ];

                            indices.forEach(idx => {
                                const info = mockData[idx.key];
                                const card = document.createElement('div');
                                card.className = 'flex-shrink-0 bg-slate-700/50 rounded-xl p-3 w-28 text-center border border-slate-600 shadow-sm';
                                card.innerHTML = `
                                    <p class="text-sm font-bold text-slate-300">${idx.name}</p>
                                    <p class="text-[10px] text-slate-500 font-normal mt-1">(API 연동 실패: 오프라인 모드)</p>
                                    <p class="text-xs text-emerald-400 mt-0.5 font-bold">${info.change}</p>
                                `;
                                container.appendChild(card);
                            });
                        } else {
                            if (i === 1) delete payload.tools;
                            await new Promise(resolve => setTimeout(resolve, delays[i]));
                        }
                    }
                }
            }

            const STORAGE_KEY = 'myPortfolioData';
            const savedData = localStorage.getItem(STORAGE_KEY);
            let localPortfolio = [];
            
            if (savedData) {
                try {
                    localPortfolio = JSON.parse(savedData);
                } catch (e) {
                    localPortfolio = [];
                }
            } else {
                localPortfolio = [
                    { symbol: 'SHLD', shares: 100, avgPrice: 40.00, price: 43.50 },
                    { symbol: 'COHR', shares: 50, avgPrice: 65.00, price: 62.20 },
                    { symbol: 'SPYM', shares: 10, avgPrice: 200.00, price: 249.00 },
                    { symbol: 'INTC', shares: 100, avgPrice: 25.00, price: 25.00 }
                ];
            }
            
            function savePortfolioToLocal() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(localPortfolio));
            }
            
            let portfolioPromptData = "";

            let portfolioChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], borderWidth: 0, hoverOffset: 6 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8', usePointStyle: true, font: { size: 13 } } }
                    }
                }
            });

            const krwFormatter = new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' });

            function renderPortfolio() {
                const listEl = document.getElementById('stockList');
                const rebalanceContainer = document.getElementById('rebalanceContainer');
                listEl.innerHTML = '';
                rebalanceContainer.innerHTML = '';
                
                const totalValue = localPortfolio.reduce((sum, item) => sum + (item.shares * item.price), 0);
                document.getElementById('totalAssetValue').textContent = `$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                
                // currentExchangeRateKRW 값이 API 연동 성공 시 최신값, 실패 시 1350으로 계산됩니다.
                const totalValueKrw = totalValue * currentExchangeRateKRW;
                document.getElementById('totalAssetValueKrw').textContent = krwFormatter.format(totalValueKrw);

                const calculatedWeights = localPortfolio.map(item => {
                    if (totalValue === 0) return 0;
                    return ((item.shares * item.price) / totalValue) * 100;
                });

                if (localPortfolio.length > 0) {
                    const targetWeight = 100 / localPortfolio.length; 
                    let hasAlerts = false;

                    localPortfolio.forEach((item, index) => {
                        const currentWeight = calculatedWeights[index];
                        const diff = currentWeight - targetWeight;

                        if (Math.abs(diff) >= 5) {
                            hasAlerts = true;
                            const isOver = diff > 0; 
                            
                            const bgClass = isOver ? 'bg-red-500/10 border-red-500/30' : 'bg-emerald-500/10 border-emerald-500/30';
                            const dotClass = isOver ? 'bg-red-500 animate-pulse' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]';
                            const textClass = isOver ? 'text-red-400' : 'text-emerald-400';
                            const btnClass = isOver ? 'bg-red-500/20 text-red-300' : 'bg-emerald-500/20 text-emerald-300';
                            
                            const title = isOver ? `${item.symbol} 비중 과다` : `${item.symbol} 비중 미달`;
                            const msg = `적정치(${targetWeight.toFixed(1)}%) 대비 ${diff > 0 ? '+' : ''}${diff.toFixed(1)}%`;
                            const action = isOver ? '일부 매도 권장' : '추가 매수 권장';

                            const alertEl = document.createElement('div');
                            alertEl.className = `rounded-xl p-4 flex items-center justify-between border ${bgClass}`;
                            alertEl.innerHTML = `
                                <div class="flex items-center space-x-3">
                                    <div class="w-2.5 h-2.5 rounded-full ${dotClass}"></div>
                                    <div>
                                        <p class="font-bold text-sm ${textClass}">${title}</p>
                                        <p class="text-xs text-slate-300 mt-0.5">${msg}</p>
                                    </div>
                                </div>
                                <button class="text-xs px-3 py-1.5 rounded-lg ${btnClass}">${action}</button>
                            `;
                            rebalanceContainer.appendChild(alertEl);
                        }
                    });

                    if (!hasAlerts) {
                        rebalanceContainer.innerHTML = `<p class="text-sm text-slate-400 p-2 text-center bg-slate-700/30 rounded-lg">✅ 모든 종목이 목표 비중에 알맞게 분산되어 있습니다.</p>`;
                    }
                } else {
                    rebalanceContainer.innerHTML = `<p class="text-sm text-slate-400 p-2 text-center bg-slate-700/30 rounded-lg">포트폴리오에 종목을 추가해 주세요.</p>`;
                }

                localPortfolio.forEach((item, index) => {
                    const weightPct = calculatedWeights[index].toFixed(1);
                    const returnPct = item.avgPrice > 0 ? (((item.price - item.avgPrice) / item.avgPrice) * 100).toFixed(1) : 0;
                    const returnColor = returnPct >= 0 ? 'text-emerald-400' : 'text-red-400';
                    const returnSign = returnPct > 0 ? '+' : '';
                    
                    const itemTotalValue = item.shares * item.price;
                    const formattedItemValue = itemTotalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    
                    const itemTotalValueKrw = itemTotalValue * currentExchangeRateKRW;
                    const formattedItemValueKrw = krwFormatter.format(itemTotalValueKrw);

                    const tag = document.createElement('div');
                    tag.className = 'bg-slate-600 p-3 rounded-xl text-xs flex flex-col gap-2 border border-slate-500 w-full';
                    tag.innerHTML = `
                        <div class="flex justify-between items-center border-b border-slate-500/50 pb-1">
                            <div>
                                <span class="font-bold text-slate-200 text-sm">${item.symbol}</span> 
                                <span class="text-slate-300 ml-1">${item.shares}주</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-emerald-400 font-bold">비중 ${weightPct}%</span>
                                <button onclick="removeStock(${index})" class="text-slate-400 hover:text-red-400 text-sm font-bold">✕</button>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-slate-300">
                            <span>취득: $${item.avgPrice.toFixed(2)} <span class="text-slate-500 mx-1">→</span> 현재: $${item.price.toFixed(2)}</span>
                            <span class="font-bold ${returnColor}">${returnSign}${returnPct}%</span>
                        </div>
                        <div class="flex justify-between items-center text-slate-400 text-xs mt-0.5">
                            <span>평가금액:</span>
                            <div class="text-right">
                                <span class="text-emerald-300 font-semibold">$${formattedItemValue}</span>
                                <span class="text-slate-300 ml-1 font-medium">(${formattedItemValueKrw})</span>
                            </div>
                        </div>
                    `;
                    listEl.appendChild(tag);
                });

                portfolioChart.data.labels = localPortfolio.map(item => item.symbol);
                portfolioChart.data.datasets[0].data = calculatedWeights;
                
                const colors = ['#ef4444', '#3b82f6', '#10b981', '#8b5cf6', '#f59e0b', '#ec4899', '#06b6d4', '#14b8a6'];
                portfolioChart.data.datasets[0].backgroundColor = localPortfolio.map((_, i) => colors[i % colors.length]);
                portfolioChart.update();

                document.getElementById('totalWeightDisplay').textContent = totalValue > 0 ? '100%' : '0%';

                if (localPortfolio.length > 0) {
                    const promptDetails = localPortfolio.map((item, index) => {
                        const returnPct = item.avgPrice > 0 ? (((item.price - item.avgPrice) / item.avgPrice) * 100).toFixed(1) : 0;
                        return `${item.symbol}(${item.shares}주, 수익률 ${returnPct}%, 비중 ${calculatedWeights[index].toFixed(1)}%)`;
                    }).join(', ');
                    portfolioPromptData = `내 포트폴리오는 현재 ${promptDetails}로 구성되어 있어. 현재 이 구성에서 내가 어떻게 포트폴리오를 다변화하고 리스크 관리를 해야 할지 전문가로서 조언해줘.`;
                } else {
                    portfolioPromptData = `현재 포트폴리오에 종목이 없어. 투자 초보자에게 추천하는 자산 배분 전략을 간단히 알려줘.`;
                }
            }

            window.removeStock = function(index) {
                localPortfolio.splice(index, 1);
                savePortfolioToLocal();
                renderPortfolio();
            };

            document.getElementById('addStockBtn').addEventListener('click', () => {
                const sym = document.getElementById('symbolInput').value.toUpperCase().trim();
                const shares = parseFloat(document.getElementById('sharesInput').value);
                const avgPrice = parseFloat(document.getElementById('avgPriceInput').value);
                const price = parseFloat(document.getElementById('priceInput').value);
                const errorMsg = document.getElementById('inputErrorMsg');
                
                if (sym && shares > 0 && avgPrice > 0 && price > 0) {
                    errorMsg.classList.add('hidden');
                    localPortfolio.push({ symbol: sym, shares: shares, avgPrice: avgPrice, price: price });
                    savePortfolioToLocal();
                    
                    document.getElementById('symbolInput').value = '';
                    document.getElementById('sharesInput').value = '';
                    document.getElementById('avgPriceInput').value = '';
                    document.getElementById('priceInput').value = '';
                    renderPortfolio();
                } else {
                    errorMsg.classList.remove('hidden');
                }
            });

            await fetchRealTimeExchangeRate();
            renderPortfolio();
            fetchRealMarketSummary();

            const aiAnalyzeBtn = document.getElementById('aiAnalyzeBtn');
            const aiResultArea = document.getElementById('aiResultArea');
            const aiLoading = document.getElementById('aiLoading');
            const aiTextResponse = document.getElementById('aiTextResponse');

            // AI 진단 함수 (수정: 개인 키 입력 시 구글 공개 모델로 자동 전환)
            async function fetchGeminiDataWithRetry(prompt, retries = 3) {
                // apiKey가 입력되어 있으면 일반 모델(gemini-2.5-flash)을, 비어있으면 캔버스 내부 모델을 사용
                const modelName = apiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { 
                        parts: [{ 
                            text: "당신은 월스트리트의 친절하고 전문적인 AI 금융 어드바이저입니다. 사용자의 포트폴리오 데이터를 분석하여, 초보자도 이해하기 쉽게 핵심만 3~4문장으로 조언해주세요. 이모지도 적절히 사용해주세요." 
                        }] 
                    }
                };

                const delays = [1000, 2000];

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "분석 결과를 생성하지 못했습니다.";
                    } catch (error) {
                        if (i === retries - 1) {
                            console.warn("AI 분석 API 연결 불가. 오프라인 기본 조언으로 대체합니다.");
                            return "💡 [API 연동 실패: 오프라인 모드] \n현재 AI 통신망에 접속할 수 없어 기본 조언을 출력합니다. (입력하신 API 키의 권한 문제이거나 일시적인 통신 오류일 수 있습니다.) 포트폴리오의 분산 투자가 잘 이루어지고 있는지 점검하고, 현금 비중을 10~20% 확보하여 시장 변동성에 대비하세요.";
                        }
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }

            aiAnalyzeBtn.addEventListener('click', async () => {
                aiAnalyzeBtn.style.display = 'none';
                aiResultArea.classList.remove('hidden');
                aiLoading.classList.remove('hidden');
                aiLoading.classList.add('flex');
                aiTextResponse.textContent = '';

                const prompt = portfolioPromptData;

                const resultText = await fetchGeminiDataWithRetry(prompt);
                
                aiLoading.classList.add('hidden');
                aiLoading.classList.remove('flex');
                aiTextResponse.textContent = resultText;
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                        navigator.serviceWorker.register('sw.js')
                            .then(registration => {
                                console.log('서비스 워커가 정상적으로 등록되었습니다.');
                            })
                            .catch(err => {
                            });
                    }
                });
            }
        });
    </script>
